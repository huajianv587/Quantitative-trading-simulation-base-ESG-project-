name: Nightly Deep Run

on:
  schedule:
    - cron: "20 8 * * 1-5"
  workflow_dispatch:

env:
  QUANT_RL_STORAGE_DIR: ${{ runner.temp }}/quant-rl
  MARKET_DATA_PROVIDER: yfinance
  SYNTHETIC_EVIDENCE_POLICY: block

jobs:
  backend-full:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Full pytest
        run: python -m pytest -q

  paper-drills:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Nightly unattended paper replay
        run: |
          mkdir -p paper_artifacts
          python scripts/paper_90_session_replay.py --count 90 --output paper_artifacts/paper_90_session_replay.json

      - name: Restore drill self-test
        run: |
          mkdir -p paper_artifacts
          python scripts/restore_quant_backup.py --self-test --json-out paper_artifacts/restore_drill.json

      - name: Paper chaos drill
        run: |
          mkdir -p paper_artifacts
          python scripts/paper_chaos_drill.py --output paper_artifacts/paper_chaos_drill.json

      - name: Upload paper drill artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paper-nightly-artifacts
          path: paper_artifacts

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install E2E dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci
          npx playwright install --with-deps

      - name: Playwright E2E
        run: npx playwright test

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Compose config smoke
        run: docker compose config

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paper cloud static smoke
        run: python scripts/staging_check.py paper-cloud --base-url http://127.0.0.1:8012 --retries 1 --delay 1 || true
