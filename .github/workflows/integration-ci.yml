name: Core Contract CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "gateway/**"
      - "configs/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"

jobs:
  core-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QUANT_RL_STORAGE_DIR: ${{ runner.temp }}/quant-rl
      MARKET_DATA_PROVIDER: yfinance
      SYNTHETIC_EVIDENCE_POLICY: block
      SCHEDULER_EXECUTION_ENGINE: hybrid_paper_workflow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run core contract suite
        run: |
          python -m pytest -q \
            tests/test_api_contracts.py \
            tests/test_quant_api.py \
            tests/test_quant_execution_alpaca.py \
            tests/test_trading_api.py \
            tests/test_ops_runtime.py
