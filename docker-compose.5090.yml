services:
  api:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-quant-api-5090
    env_file:
      - .env
    environment:
      PORT: 8000
      APP_MODE: hybrid
      LLM_BACKEND_MODE: remote
      LOCAL_API_URL: http://api:8000
      QDRANT_URL: http://qdrant:6333
      REMOTE_LLM_URL: http://remote-llm:8010
      SCHEDULER_OWNER: api
      PAPER_REWARD_SUBMIT_ENABLED: "false"
      RLVR_HORIZONS: "1,3,5"
      RLVR_WEIGHTS: "0.30,0.30,0.40"
      P1_SEQUENCE_ENABLED: "true"
      EVENT_CLASSIFIER_ENABLED: "true"
      EVENT_CLASSIFIER_TARGET: controversy_label
      P2_BANDIT_ENABLED: "true"
    ports:
      - "8012:8000"
    volumes:
      - ./model-serving/checkpoint:/app/model-serving/checkpoint:ro
      - ./data:/app/data
      - app_storage:/app/storage
      - ./storage/quant/rl:/app/storage/quant/rl
      - ./storage/quant/model_registry:/app/storage/quant/model_registry
    depends_on:
      qdrant:
        condition: service_started
      remote-llm:
        condition: service_healthy
    cpus: "2.0"
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/livez', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

  quant-scheduler:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-quant-scheduler-5090
    env_file:
      - .env
    environment:
      APP_MODE: hybrid
      LLM_BACKEND_MODE: remote
      LOCAL_API_URL: http://api:8000
      QDRANT_URL: http://qdrant:6333
      REMOTE_LLM_URL: http://remote-llm:8010
      P1_SEQUENCE_ENABLED: "true"
      EVENT_CLASSIFIER_ENABLED: "true"
      EVENT_CLASSIFIER_TARGET: controversy_label
      P2_BANDIT_ENABLED: "true"
      SCHEDULER_OWNER: quant-scheduler
      SCHEDULER_EXECUTION_ENGINE: hybrid_paper_workflow
      SCHEDULER_AUTO_SUBMIT: "true"
      PAPER_REWARD_SUBMIT_ENABLED: "false"
      RLVR_HORIZONS: "1,3,5"
      RLVR_WEIGHTS: "0.30,0.30,0.40"
      SCHEDULER_REQUIRE_TRADING_SESSION: "true"
      SCHEDULER_REQUIRE_MARKET_CLOCK_FOR_SUBMIT: "true"
      SCHEDULER_CLOSE_GRACE_MINUTES: "10"
      SCHEDULER_MAX_EXECUTION_SYMBOLS: "2"
      SCHEDULER_MAX_DAILY_NOTIONAL_USD: "200"
      ALPACA_DEFAULT_TEST_NOTIONAL: "100"
      ALPACA_PAPER_MAX_ORDER_NOTIONAL: "100"
      EXECUTION_PAPER_MAX_NOTIONAL_PER_ORDER: "100"
      ALPACA_ENABLE_LIVE_TRADING: "false"
      UNATTENDED_PAPER_MODE: "true"
      ALERT_NOTIFIER: telegram
      QUANT_DAILY_DIGEST_RECIPIENTS: jianghuajian99@gmail.com
      QUANT_DAILY_DIGEST_CHANNELS: telegram,email
      SCHEDULER_STATE_PATH: /app/storage/quant/scheduler/runtime_state.json
      SCHEDULER_HEARTBEAT_PATH: /app/storage/quant/scheduler/heartbeat.json
      SCHEDULER_LOCK_PATH: /app/storage/quant/scheduler/worker.lock
    command: ["python", "scripts/quant_signal_scheduler.py", "--poll-seconds", "20"]
    volumes:
      - ./model-serving/checkpoint:/app/model-serving/checkpoint:ro
      - ./data:/app/data
      - app_storage:/app/storage
      - ./storage/quant/rl:/app/storage/quant/rl
      - ./storage/quant/model_registry:/app/storage/quant/model_registry
    depends_on:
      api:
        condition: service_healthy
      qdrant:
        condition: service_started
      remote-llm:
        condition: service_healthy
    cpus: "2.0"
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import json, pathlib, sys; from datetime import datetime, timezone; p=pathlib.Path('/app/storage/quant/scheduler/heartbeat.json'); data=json.loads(p.read_text()) if p.exists() else {}; raw=data.get('updated_at') or data.get('generated_at') or '1970-01-01T00:00:00+00:00'; ts=datetime.fromisoformat(raw.replace('Z','+00:00')); sys.exit(0 if (datetime.now(timezone.utc)-ts.astimezone(timezone.utc)).total_seconds() < 300 else 1)"]
      interval: 45s
      timeout: 10s
      start_period: 90s
      retries: 5

  remote-llm:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-quant-remote-llm-5090
    env_file:
      - .env
    environment:
      REMOTE_LLM_HOST: 0.0.0.0
      REMOTE_LLM_PORT: 8010
      REMOTE_LLM_BASE_MODEL: ${REMOTE_LLM_BASE_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      REMOTE_LLM_ADAPTER_PATH: /app/model-serving/checkpoint/qwen_esg_lora_v2
      HF_HOME: /root/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/huggingface
    command: ["python", "model-serving/remote_llm_server.py"]
    ports:
      - "8010:8010"
    volumes:
      - ./model-serving/checkpoint:/app/model-serving/checkpoint
      - hf_cache:/root/.cache/huggingface
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8010/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: esg-quant-qdrant-5090
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
  app_storage:
  hf_cache:
