services:
  api:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-quant-api
    env_file:
      - .env
    environment:
      APP_MODE: hybrid
      LLM_BACKEND_MODE: remote
      PORT: 8000
      LOCAL_API_URL: http://api:8000
      REMOTE_LLM_URL: http://host.docker.internal:8010
      QDRANT_URL: http://qdrant:6333
      API_HEALTHCHECK_REQUIRED_COMPONENTS: api,auth_keys,llm_local_auto,llm_hybrid_remote,qdrant,model_registry
      SCHEDULER_OWNER: api
      PAPER_REWARD_SUBMIT_ENABLED: "false"
      RLVR_HORIZONS: "1,3,5"
      RLVR_WEIGHTS: "0.30,0.30,0.40"
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      NUMEXPR_NUM_THREADS: "2"
      TORCH_NUM_THREADS: "2"
      TOKENIZERS_PARALLELISM: "false"
    ports:
      - "8012:8000"
    volumes:
      - app_storage:/app/storage
      - ./model-serving/checkpoint:/app/model-serving/checkpoint:ro
      - ./storage/quant/rl:/app/storage/quant/rl
      - ./storage/quant/model_registry:/app/storage/quant/model_registry
    depends_on:
      qdrant:
        condition: service_started
    cpus: "2.0"
    mem_limit: 4g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/livez', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  quant-scheduler:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-quant-scheduler
    env_file:
      - .env
    environment:
      LOCAL_API_URL: http://api:8000
      QDRANT_URL: http://qdrant:6333
      SCHEDULER_OWNER: quant-scheduler
      SCHEDULER_EXECUTION_ENGINE: hybrid_paper_workflow
      SCHEDULER_AUTO_SUBMIT: "true"
      PAPER_REWARD_SUBMIT_ENABLED: "false"
      RLVR_HORIZONS: "1,3,5"
      RLVR_WEIGHTS: "0.30,0.30,0.40"
      SCHEDULER_REQUIRE_TRADING_SESSION: "true"
      SCHEDULER_REQUIRE_MARKET_CLOCK_FOR_SUBMIT: "true"
      SCHEDULER_CLOSE_GRACE_MINUTES: "10"
      SCHEDULER_MAX_EXECUTION_SYMBOLS: "2"
      SCHEDULER_MAX_DAILY_NOTIONAL_USD: "200"
      ALPACA_DEFAULT_TEST_NOTIONAL: "100"
      ALPACA_PAPER_MAX_ORDER_NOTIONAL: "100"
      EXECUTION_PAPER_MAX_NOTIONAL_PER_ORDER: "100"
      ALPACA_ENABLE_LIVE_TRADING: "false"
      UNATTENDED_PAPER_MODE: "true"
      ALERT_NOTIFIER: telegram
      QUANT_DAILY_DIGEST_RECIPIENTS: jianghuajian99@gmail.com
      QUANT_DAILY_DIGEST_CHANNELS: telegram,email
      SCHEDULER_STATE_PATH: /app/storage/quant/scheduler/runtime_state.json
      SCHEDULER_HEARTBEAT_PATH: /app/storage/quant/scheduler/heartbeat.json
      SCHEDULER_LOCK_PATH: /app/storage/quant/scheduler/worker.lock
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      NUMEXPR_NUM_THREADS: "2"
      TORCH_NUM_THREADS: "2"
      TOKENIZERS_PARALLELISM: "false"
    command: ["python", "scripts/quant_signal_scheduler.py", "--poll-seconds", "20"]
    volumes:
      - app_storage:/app/storage
      - ./model-serving/checkpoint:/app/model-serving/checkpoint:ro
      - ./storage/quant/rl:/app/storage/quant/rl
      - ./storage/quant/model_registry:/app/storage/quant/model_registry
    depends_on:
      qdrant:
        condition: service_started
    cpus: "2.0"
    mem_limit: 4g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, os, sys; from pathlib import Path; from datetime import datetime, timezone; p = Path(os.getenv('SCHEDULER_HEARTBEAT_PATH', '/app/storage/quant/scheduler/heartbeat.json')); payload = json.loads(p.read_text(encoding='utf-8')) if p.exists() else {}; ts = datetime.fromisoformat(payload.get('updated_at', '1970-01-01T00:00:00+00:00')); sys.exit(0 if (datetime.now(timezone.utc) - ts).total_seconds() < 300 else 1)"
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: esg-quant-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    cpus: "1.0"
    mem_limit: 2g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  qdrant_data:
  app_storage:
