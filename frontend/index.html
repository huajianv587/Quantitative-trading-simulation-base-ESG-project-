<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESG Quant IO Console</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'esg-e': '#10B981',
            'esg-e-dim': '#064E3B',
            'esg-s': '#3B82F6',
            'esg-s-dim': '#1E3A5F',
            'esg-g': '#F59E0B',
            'esg-g-dim': '#451A03',
            'panel': '#101826',
            'panel-2': '#162132',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    window.__APP_ASSET_VERSION__ = '20260409-frontend-v8';
  </script>
  <link rel="stylesheet" href="/app/css/app.css?v=20260409-frontend-v8">

  <style>
    :root {
      --bg-base: #09111d;
      --bg-surface: #101826;
      --bg-surface-2: #162132;
      --bg-elevated: #1b2840;
      --bg-border: #2a3952;
      --text-primary: #f3f7fb;
      --text-secondary: #b0bfd3;
      --text-muted: #6f819a;
      --esg-e: #10B981;
      --esg-s: #3B82F6;
      --esg-g: #F59E0B;
      --accent: #5ea5ff;
      --accent-soft: rgba(94, 165, 255, 0.14);
    }
  </style>
</head>
<body class="bg-[var(--bg-base)] text-[var(--text-primary)] font-sans app-body">
  <div id="cursor-aura" class="cursor-aura" aria-hidden="true"></div>
  <div id="route-transition" class="route-transition" aria-hidden="true">
    <div class="route-transition__grid"></div>
    <div class="route-transition__beam"></div>
    <div class="route-transition__label">
      <span class="route-transition__kicker">Loading</span>
      <span id="route-transition-title" class="route-transition__title">ESG Quant IO</span>
    </div>
  </div>

  <div id="app-shell" class="app-shell">
    <aside id="sidebar" class="app-sidebar">
      <div id="nav-logo" class="app-sidebar__brand">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 bg-gradient-to-br from-esg-e to-esg-s rounded-2xl flex items-center justify-center font-bold text-lg text-[#0B0F1A] shadow-lg">
            E
          </div>
          <div class="flex flex-col">
            <span class="font-bold text-xl tracking-wide">ESG Quant IO</span>
            <span class="text-base text-[var(--text-muted)] mt-0.5">ESG Quant Command Console</span>
          </div>
        </div>
      </div>

      <nav id="nav-links" class="app-sidebar__nav"></nav>

      <div id="nav-footer" class="app-sidebar__footer">
        <div id="health-indicator" class="flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 bg-gray-500 rounded-full"></span>
          <span>Checking backend...</span>
        </div>
        <div class="mt-3 text-sm text-[var(--text-muted)]">Build 20260409-v8</div>
      </div>
    </aside>

    <div class="app-main">
      <header id="top-bar" class="app-topbar">
        <div>
          <div class="text-sm uppercase tracking-[0.28em] text-[var(--text-muted)]">Workspace</div>
          <div id="page-title" class="text-3xl font-bold tracking-tight mt-1"></div>
        </div>
        <div id="header-actions" class="flex items-center gap-4"></div>
      </header>

      <main id="app-root" class="app-content"></main>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2"></div>
  <div id="modal-container"></div>

  <script src="/app/app-config.js?v=20260409-frontend-v8"></script>
  <script type="module" src="/app/js/app.js?v=20260409-frontend-v8"></script>
</body>
</html>
