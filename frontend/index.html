<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quant Terminal</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="/app/vendor/echarts/echarts.min.js?v=20260424222239"></script>
  <link rel="stylesheet" href="/app/css/app.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/layout-system.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/workbench-layout.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/trading-ops.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/loading-error.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/responsive.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/accessibility.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/performance.css?v=20260424222239">
  <link rel="stylesheet" href="/app/css/error-ui.css?v=20260424222239">
  <script>window.__APP_VER__ = 'v20260424222239';</script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="c-dot"></div>
  <div id="c-ring"></div>

  <div class="bg-aurora" aria-hidden="true">
    <div class="bg-aurora__spot bg-aurora__spot--1"></div>
    <div class="bg-aurora__spot bg-aurora__spot--2"></div>
    <div class="bg-aurora__spot bg-aurora__spot--3"></div>
  </div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell">
    <aside class="app-sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path d="M2 13 L6 7 L9 10 L13 4 L16 7" stroke="#00FF88" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="7" r="1.5" fill="#00FF88"/>
          </svg>
        </div>
        <div>
          <div class="logo-name">Quant Terminal</div>
          <div class="logo-tag" data-i18n="app.logo_tag">ALPHA ENGINE · LIVE</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="nav-links"></nav>

      <div class="sidebar-status">
        <div class="status-row">
          <span class="status-dot" id="health-dot"></span>
          <span id="health-text" class="status-label">Connecting...</span>
        </div>
        <div class="status-version">v8 · 2026</div>
      </div>
    </aside>

    <div class="app-main">
      <header class="app-topbar">
        <div class="topbar-crumb">
          <span class="crumb-root">QT</span>
          <span class="crumb-sep">›</span>
          <span class="crumb-page" id="page-title">Dashboard</span>
        </div>
        <div class="topbar-right" id="header-actions"></div>
      </header>
      <main class="app-content" id="app-root" role="main" aria-label="Main content"></main>
    </div>

    <div class="shell-account-host" id="shell-account" data-click-contract="off"></div>
  </div>

  <div id="toast-container"></div>

  <script>
    (function() {
      const dot = document.getElementById('c-dot');
      const ring = document.getElementById('c-ring');
      let mx = 0;
      let my = 0;
      let rx = 0;
      let ry = 0;
      document.addEventListener('mousemove', function(event) {
        mx = event.clientX;
        my = event.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
      });
      (function lerp() {
        rx += (mx - rx) * 0.1;
        ry += (my - ry) * 0.1;
        ring.style.left = rx + 'px';
        ring.style.top = ry + 'px';
        requestAnimationFrame(lerp);
      })();
      document.addEventListener('mouseover', function(event) {
        const interactive = event.target && event.target.closest('a,button,input,select,textarea,[role=button],.nav-item,.btn,.nav-group__trigger');
        document.body.classList.toggle('c-hover', !!interactive);
      });
    })();
  </script>

  <script src="/app/app-config.js?v=20260424222239"></script>
  <script type="module" src="/app/js/utils/lazy-load.js?v=20260424222239"></script>
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('app-root');
      if (!root) return;
      root.innerHTML = `
        <div style="padding:32px;color:#FF3D57;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8">
          <b>Error:</b> ${event.message}
          <br>
          <span style="opacity:.5">${event.filename || ''}:${event.lineno}</span>
        </div>
      `;
    });
  </script>
  <script type="module" src="/app/js/app.js?v=20260424222239"></script>
</body>
</html>
